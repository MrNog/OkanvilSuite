name: Package addons

# Monorepo for the Okanvil suite. On every push to main, build one clean
# <Addon>.zip per top-level addon folder (each zip contains a folder named exactly
# after the addon, so it's install-ready) and publish them all to the rolling
# "Latest" release — users download just the folders they want.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build per-addon zips (only folders that contain a .toc)
        run: |
          mkdir -p out
          for d in */ ; do
            name="${d%/}"
            if ls "$name"/*.toc >/dev/null 2>&1; then
              mkdir -p "staging/$name"
              cp -r "$name/." "staging/$name/"
              ( cd staging && zip -r "../out/$name.zip" "$name" )
              echo "packaged $name"
            fi
          done

      - name: Publish / update the Latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # create the rolling release once; ignore error if it already exists
          gh release create latest --title "Latest" --latest \
            --notes "Rolling latest builds of every Okanvil addon — download the folder(s) you want." \
            2>/dev/null || true
          # --clobber overwrites same-named assets (fixes "ReleaseAsset already_exists")
          gh release upload latest out/*.zip --clobber
